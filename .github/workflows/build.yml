name: build
on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.zig'
      - 'build.zig.zon'
      - '.github/workflows/ci.yml'
  push:
    branches: [ main ]
    paths:
      - '**.zig'
      - 'build.zig.zon'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-examples:
    name: Build Examples
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.956+2dca73595
      - name: Build all examples
        run: zig build

  run-tests:
    name: Run Tests
    needs: build-examples
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.956+2dca73595
      - name: Build all examples
        run: zig build test --summary all
